name: Publish Design Tokens

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tagged: ${{ steps.bump.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_BUMP: ${{ inputs.bump }}
        run: |
          # Manual dispatch — use the input directly
          if [ -n "$MANUAL_BUMP" ]; then
            echo "Manual dispatch with bump: $MANUAL_BUMP"
            echo "bump=$MANUAL_BUMP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push to main — look up the merged PR
          SHA=$(git rev-parse HEAD)
          PR_JSON=$(gh pr list --search "$SHA" --state merged --json labels,number --limit 1)

          if [ "$(echo "$PR_JSON" | jq length)" -eq 0 ]; then
            echo "No merged PR found for $SHA. Skipping release."
            echo "bump=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP=$(echo "$PR_JSON" | jq -r '
            .[0].labels
            | map(.name)
            | map(select(. == "major" or . == "minor" or . == "patch"))
            | first
            // empty
          ')

          if [ -z "$BUMP" ]; then
            echo "No release label on merged PR. Skipping release."
          else
            echo "Bump type: $BUMP"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute version and create tag
        id: bump
        if: steps.pr.outputs.bump != ''
        env:
          BUMP: ${{ steps.pr.outputs.bump }}
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Creating tag $NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tagged=true" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit generated iOS files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/
          if git diff --cached --quiet; then
            echo "No iOS file changes to commit"
          else
            git commit -m "chore: update generated iOS tokens for ${{ needs.release.outputs.version }}"
            git push origin main
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-tokens
          path: build/android/

  publish-maven:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-tokens
          path: android-build/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: android-build
        run: gradle wrapper

      - name: Publish to GitHub Packages
        working-directory: android-build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # Strip leading 'v' from tag for version
          export VERSION="${VERSION#v}"
          ./gradlew publish

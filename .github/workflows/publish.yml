name: Publish Design Tokens

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      previous_version: ${{ steps.bump.outputs.previous_version }}
      tagged: ${{ steps.bump.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_BUMP: ${{ inputs.bump }}
        run: |
          # Manual dispatch — use the input directly
          if [ -n "$MANUAL_BUMP" ]; then
            echo "Manual dispatch with bump: $MANUAL_BUMP"
            echo "bump=$MANUAL_BUMP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push to main — look up the merged PR
          SHA=$(git rev-parse HEAD)
          PR_JSON=$(gh pr list --search "$SHA" --state merged --json labels,number --limit 1)

          if [ "$(echo "$PR_JSON" | jq length)" -eq 0 ]; then
            echo "No merged PR found for $SHA. Skipping release."
            echo "bump=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP=$(echo "$PR_JSON" | jq -r '
            .[0].labels
            | map(.name)
            | map(select(. == "major" or . == "minor" or . == "patch"))
            | first
            // empty
          ')

          if [ -z "$BUMP" ]; then
            echo "No release label on merged PR. Skipping release."
          else
            echo "Bump type: $BUMP"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute version and create tag
        id: bump
        if: steps.pr.outputs.bump != ''
        env:
          BUMP: ${{ steps.pr.outputs.bump }}
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -v '-' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi

          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Creating tag $NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "tagged=true" >> "$GITHUB_OUTPUT"

  build:
    needs: release
    if: needs.release.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: android-tokens
          path: build/android/

      - uses: actions/upload-artifact@v4
        with:
          name: ios-tokens
          path: build/ios/

      - uses: actions/upload-artifact@v4
        with:
          name: web-tokens
          path: build/web/

  publish-maven:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-tokens
          path: android-build/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        working-directory: android-build
        run: gradle wrapper

      - name: Publish to GitHub Packages
        working-directory: android-build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          # Strip leading 'v' from tag for version
          export VERSION="${VERSION#v}"
          ./gradlew publish

  publish-spm:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: generated/ios
          fetch-depth: 0
        continue-on-error: true

      - name: Init branch if needed
        run: |
          if ! git rev-parse --verify generated/ios 2>/dev/null; then
            git checkout --orphan generated/ios
            git rm -rf . || true
          fi

      - uses: actions/download-artifact@v4
        with:
          name: ios-tokens
          path: ios-build/

      - name: Copy files to repo root
        run: |
          cp ios-build/Package.swift .
          rm -rf Sources
          cp -r ios-build/Sources .

      - name: Commit and tag
        env:
          TAG: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/
          git commit -m "chore: update ios tokens for ${TAG}" || echo "no changes"
          git tag "${TAG}-ios"
          git push origin generated/ios --tags

  publish-npm:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-tokens
          path: web-build/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@jaidensiu'

      - name: Set version and publish
        working-directory: web-build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          npm version "${VERSION#v}" --no-git-tag-version
          npm publish

  post-release:
    needs: [release, publish-maven, publish-spm, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bump package version and update changelog
        env:
          VERSION: ${{ needs.release.outputs.version }}
          PREVIOUS_VERSION: ${{ needs.release.outputs.previous_version }}
        run: |
          npm version "${VERSION#v}" --no-git-tag-version

          # Insert new version entry after the "# Changelog" title
          LINK="https://github.com/jaidensiu/world-design-system/compare/${PREVIOUS_VERSION}...${VERSION}"
          sed -i "/^# Changelog/a\\\n## ${VERSION}\n- [Full changelog](${LINK})\n" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "release: $VERSION"
          git push origin main
